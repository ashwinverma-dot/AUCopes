<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "College Information Portal" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">College Portal</div>
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('academics') }}">Departments & Courses</a></li>
            <li><a href="{{ url_for('faculty_contact') }}">Faculty & Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <p>© 2026 College Information Portal | Flask, Docker and GitHub Actions CI/CD</p>
</footer>

</body>
</html>
